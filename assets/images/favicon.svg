<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded favicon background -->
  <rect width="48" height="48" rx="10" fill="#E6F4FE" />
  
  <!-- Simplified checkmark/clipboard visual -->
  <g transform="translate(24, 24) scale(0.18) translate(-140, -110)">
    <!-- Clipboard Outline -->
    <rect x="60" y="30" width="160" height="150" rx="24" fill="#FFFFFF" stroke="#171717" stroke-width="12" />
    <!-- Calendar Clip -->
    <rect x="110" y="20" width="60" height="24" rx="8" fill="#171717" />
    
    <!-- Big Checked Circle and Mark in Center -->
    <circle cx="140" cy="115" r="45" fill="#D97706" />
    <path d="M120 115L132 127L160 97" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
