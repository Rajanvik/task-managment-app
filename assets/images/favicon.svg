<svg width="48" height="48" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary brand gradient -->
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#171717" />
      <stop offset="100%" stop-color="#525252" />
    </linearGradient>

    <!-- Circle background gradient matching onboarding style -->
    <linearGradient id="circleBgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6F4FE" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#E6F4FE" stop-opacity="0.0" />
    </linearGradient>
  </defs>

  <!-- Centered and Scaled Illustration inside Android's 340px Safe Zone -->
  <g transform="translate(256, 256) scale(1.5) translate(-140, -110)">
    <!-- Giant Background Spotlight Circle (Matches Onboarding) -->
    <circle cx="140" cy="110" r="100" fill="url(#circleBgGrad)" />

    <!-- Simulated drop shadow (failsafe alternative to SVG filters) -->
    <rect x="58" y="35" width="164" height="152" rx="22" fill="#171717" opacity="0.02" />
    <rect x="59" y="32" width="162" height="151" rx="21" fill="#171717" opacity="0.05" />

    <!-- Clipboard/Calendar Card -->
    <rect x="60" y="30" width="160" height="150" rx="20" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="2" />
    
    <!-- Calendar Header clip -->
    <rect x="110" y="20" width="60" height="20" rx="6" fill="url(#brandGrad)" />
    <circle cx="125" cy="20" r="4" fill="#FFFFFF" />
    <circle cx="155" cy="20" r="4" fill="#FFFFFF" />

    <!-- Task Line 1 (Completed) -->
    <rect x="90" y="70" width="100" height="12" rx="4" fill="url(#brandGrad)" opacity="0.85" />
    <circle cx="80" cy="76" r="8" fill="#D97706" />
    <path d="M76.5 76L78.5 78L83.5 73.5" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Task Line 2 (Pending) -->
    <rect x="90" y="102" width="80" height="12" rx="4" fill="#F3F4F6" />
    <circle cx="80" cy="108" r="8" fill="#E5E7EB" />

    <!-- Task Line 3 (Completed) -->
    <rect x="90" y="134" width="90" height="12" rx="4" fill="url(#brandGrad)" opacity="0.85" />
    <circle cx="80" cy="140" r="8" fill="#D97706" />
    <path d="M76.5 140L78.5 142L83.5 137.5" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Clock overlay representing time management -->
    <g transform="translate(190, 140)">
      <circle cx="25" cy="25" r="24" fill="#FFFFFF" stroke="url(#brandGrad)" stroke-width="3.5" />
      <path d="M25 11V25H34" stroke="#171717" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="25" cy="25" r="2.5" fill="#D97706" />
    </g>

    <!-- Pencil Graphic -->
    <g transform="translate(42, 122) rotate(-45)">
      <rect x="0" y="0" width="12" height="60" rx="3" fill="url(#brandGrad)" />
      <path d="M0 0 L6 -8 L12 0 Z" fill="#D97706" />
    </g>

    <!-- Sparkles of productivity -->
    <g transform="translate(48, 48)">
      <path d="M4 0 L5.2 2.8 L8 4 L5.2 5.2 L4 8 L2.8 5.2 L0 4 L2.8 2.8 Z" fill="#D97706" />
    </g>
    <g transform="translate(210, 40)">
      <path d="M3 0 L3.9 2.1 L6 3 L3.9 3.9 L3 6 L2.1 3.9 L0 3 L2.1 2.1 Z" fill="#D97706" opacity="0.8" />
    </g>
  </g>
</svg>
