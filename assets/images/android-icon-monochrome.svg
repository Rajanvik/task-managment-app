<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Centered and Scaled Monochrome Illustration -->
  <g transform="translate(256, 256) scale(1.5) translate(-140, -110)">
    <!-- Clipboard/Calendar Card (Monochrome Stroke and Fill) -->
    <rect x="60" y="30" width="160" height="150" rx="20" fill="none" stroke="#000000" stroke-width="8" />
    
    <!-- Calendar Header clip -->
    <rect x="110" y="20" width="60" height="20" rx="6" fill="#000000" />
    <circle cx="125" cy="20" r="3" fill="none" stroke="#FFFFFF" stroke-width="2" />
    <circle cx="155" cy="20" r="3" fill="none" stroke="#FFFFFF" stroke-width="2" />

    <!-- Task Line 1 -->
    <rect x="94" y="72" width="90" height="8" rx="3" fill="#000000" />
    <circle cx="80" cy="76" r="8" fill="#000000" />
    <path d="M76.5 76L78.5 78L83.5 73.5" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Task Line 2 (Empty Circle + Line) -->
    <rect x="94" y="104" width="70" height="8" rx="3" fill="none" stroke="#000000" stroke-width="3" />
    <circle cx="80" cy="108" r="7" fill="none" stroke="#000000" stroke-width="3" />

    <!-- Task Line 3 -->
    <rect x="94" y="136" width="80" height="8" rx="3" fill="#000000" />
    <circle cx="80" cy="140" r="8" fill="#000000" />
    <path d="M76.5 140L78.5 142L83.5 137.5" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Clock overlay -->
    <g transform="translate(190, 140)">
      <circle cx="25" cy="25" r="23" fill="#FFFFFF" stroke="#000000" stroke-width="6" />
      <path d="M25 12V25H33" stroke="#000000" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="25" cy="25" r="3" fill="#000000" />
    </g>

    <!-- Pencil Graphic -->
    <g transform="translate(42, 122) rotate(-45)">
      <rect x="0" y="0" width="12" height="60" rx="3" fill="#000000" />
      <path d="M0 0 L6 -8 L12 0 Z" fill="#000000" />
    </g>

    <!-- Sparkles of productivity -->
    <g transform="translate(48, 48)">
      <path d="M4 0 L5.2 2.8 L8 4 L5.2 5.2 L4 8 L2.8 5.2 L0 4 L2.8 2.8 Z" fill="#000000" />
    </g>
    <g transform="translate(210, 40)">
      <path d="M3 0 L3.9 2.1 L6 3 L3.9 3.9 L3 6 L2.1 3.9 L0 3 L2.1 2.1 Z" fill="#000000" />
    </g>
  </g>
</svg>
